<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urinalysis Master Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f8ff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; text-align: center; position: relative; }
        .hidden { display: none; }
        .urine-sample { width: 100px; height: 150px; margin: 20px auto; border: 5px solid #ddd; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; border-top: none; position: relative; }
        .liquid { position: absolute; bottom: 0; width: 100%; height: 80%; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; transition: background 0.5s; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; margin: 5px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        #timer { font-size: 24px; font-weight: bold; color: #e74c3c; }
        #score-display { font-size: 18px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="home-screen">
        <h1>Urinalysis Master</h1>
        <input type="text" id="player-name" placeholder="Enter Your Name" style="padding: 10px; width: 80%; margin-bottom: 20px;"><br>
        <button onclick="startGame()">START GAME</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="score-display">Score: <span id="current-score">0</span>/10</div>
        <div id="timer">10</div>
        <div class="urine-sample">
            <div id="urine-color" class="liquid"></div>
        </div>
        <h3 id="question-text">What does this color indicate?</h3>
        <div id="options"></div>
        <hr>
        <button onclick="goHome()" style="background: #666;">Home</button>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Game Over!</h2>
        <p id="final-stats"></p>
        <button onclick="saveToFile()">Save Results (Download)</button>
        <button onclick="goHome()" style="background: #2196F3;">Play Again</button>
    </div>
</div>

<audio id="sound-correct" src="https://actions.google.com/sounds/v1/cartoon/clinker_win.ogg"></audio>
<audio id="sound-wrong" src="https://actions.google.com/sounds/v1/emergency/beeps.ogg"></audio>

<script>
    const questions = [
        { color: "#FFFFE0", ans: "Hydrated", opts: ["Hydrated", "Dehydrated", "Blood"] },
        { color: "#FFD700", ans: "Normal", opts: ["Normal", "Liver Issues", "Excess B-Vitamins"] },
        { color: "#8B4513", ans: "Severe Dehydration", opts: ["Normal", "Severe Dehydration", "Diabetes"] },
        { color: "#FF4500", ans: "Blood/Rifampin", opts: ["Blood/Rifampin", "Hydrated", "Healthy"] },
        { color: "#0000FF", ans: "Methylene Blue", opts: ["Healthy", "Methylene Blue", "Dehydrated"] },
        { color: "#FFFF00", ans: "B Vitamins", opts: ["B Vitamins", "Blood", "Liver failure"] },
        { color: "#7CFC00", ans: "Asparagus/Bacteria", opts: ["Asparagus/Bacteria", "Normal", "Dehydrated"] },
        { color: "#FFFFFF", ans: "Chyluria", opts: ["Chyluria", "Normal", "Healthy"] },
        { color: "#000000", ans: "Alkaptonuria", opts: ["Alkaptonuria", "Hydrated", "High Sugar"] },
        { color: "#FFC0CB", ans: "Beets/Berries", opts: ["Normal", "Beets/Berries", "Liver Issue"] }
    ];

    let currentQ = 0;
    let score = 0;
    let timeLeft = 10;
    let timerInterval;
    let playerName = "";

    function startGame() {
        playerName = document.getElementById('player-name').value || "Anonymous";
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        currentQ = 0;
        score = 0;
        nextQuestion();
    }

    function nextQuestion() {
        if (currentQ >= 10) return endGame();
        
        clearInterval(timerInterval);
        timeLeft = 10;
        document.getElementById('timer').innerText = timeLeft;
        
        const q = questions[currentQ];
        document.getElementById('urine-color').style.backgroundColor = q.color;
        document.getElementById('current-score').innerText = score;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        q.opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt);
            optionsDiv.appendChild(btn);
        });

        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) checkAnswer(null);
        }, 1000);
    }

    function checkAnswer(choice) {
        clearInterval(timerInterval);
        const correct = questions[currentQ].ans;
        
        if (choice === correct) {
            score++;
            document.getElementById('sound-correct').play();
        } else {
            document.getElementById('sound-wrong').play();
        }
        
        currentQ++;
        setTimeout(nextQuestion, 500);
    }

    function endGame() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-stats').innerText = `${playerName}, your final score is ${score}/10`;
    }

    function goHome() {
        clearInterval(timerInterval);
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('home-screen').classList.remove('hidden');
    }

    function saveToFile() {
        const text = `Player: ${playerName}\nScore: ${score}/10\nDate: ${new Date().toLocaleString()}`;
        const blob = new Blob([text], { type: 'text/plain' });
        const anchor = document.createElement('a');
        anchor.download = `${playerName}_score.txt`;
        anchor.href = window.URL.createObjectURL(blob);
        anchor.click();
        alert("Score saved! You can now upload this file to your Google Drive.");
    }
</script>

</body>
</html>
