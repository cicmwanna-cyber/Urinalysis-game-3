<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urine Luck: Lab Challenge</title>
    <style>
        :root {
            --neon-yellow: #ccff00;
            --error-red: #ff4444;
            --bg-dark: #1a1a1a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #game-container {
            max-width: 600px;
            width: 100%;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid var(--neon-yellow);
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.2);
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--neon-yellow);
            margin-bottom: 20px;
        }
        .lab-results {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--neon-yellow);
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #444;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
        }
        .option-btn:hover { background: #555; }
        .correct { background: #2e7d32 !important; animation: shake 0.5s; }
        .wrong { background: #c62828 !important; animation: shake 0.5s; }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(5px); }
            50% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        #leaderboard {
            margin-top: 20px;
            width: 100%;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>🧪 URINE LUCK</h1>
    
    <div id="game-container">
        <div id="setup">
            <input type="text" id="player-name" placeholder="Enter Lab Tech Name..." style="padding:10px; width:80%;">
            <button class="option-btn" onclick="startGame()" style="background:var(--neon-yellow); color:black; font-weight:bold;">START SHIFT</button>
        </div>

        <div id="game-play" style="display:none;">
            <div class="stats-bar">
                <span>TECH: <span id="display-name"></span></span>
                <span>SCORE: <span id="score">0</span></span>
            </div>
            
            <div class="lab-results" id="case-data">
                </div>

            <div id="options">
                </div>
        </div>
    </div>

    <div id="leaderboard">
        <h3>🏆 Hall of Fame</h3>
        <ul id="score-list"></ul>
    </div>

<script>
    const cases = [
        {
            data: "<b>Color:</b> Pale Yellow<br><b>Glucose:</b> +++ High<br><b>Ketones:</b> ++ Moderate<br><b>Note:</b> Fruity odor detected.",
            options: ["Diabetes Mellitus", "UTI", "Dehydration", "Normal"],
            answer: 0
        },
        {
            data: "<b>Color:</b> Cloudy Amber<br><b>Leukocytes:</b> Positive<br><b>Nitrites:</b> Positive<br><b>Note:</b> Patient reports burning.",
            options: ["Kidney Stones", "UTI", "Liver Failure", "Diabetes"],
            answer: 1
        },
        {
            data: "<b>Color:</b> Dark 'Tea' Color<br><b>Bilirubin:</b> +++ High<br><b>Urobilinogen:</b> Increased",
            options: ["Healthy", "Over-hydration", "Biliary Obstruction / Liver Issue", "UTI"],
            answer: 2
        }
    ];

    let score = 0;
    let playerName = "";

    function playSound(type) {
        const synth = window.speechSynthesis;
        if (type === 'correct') {
            const utterance = new SpeechSynthesisUtterance("Correct! Excellent analysis.");
            utterance.pitch = 1.5;
            synth.speak(utterance);
        } else {
            const utterance = new SpeechSynthesisUtterance("Error! Contaminated sample!");
            utterance.pitch = 0.5;
            synth.speak(utterance);
        }
    }

    function startGame() {
        playerName = document.getElementById('player-name').value || "Guest Tech";
        document.getElementById('display-name').innerText = playerName;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game-play').style.display = 'block';
        loadCase();
        updateLeaderboard();
    }

    function loadCase() {
        const randomCase = cases[Math.floor(Math.random() * cases.length)];
        document.getElementById('case-data').innerHTML = randomCase.data;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        randomCase.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, randomCase.answer, btn);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct, btn) {
        if (selected === correct) {
            score += 100;
            btn.classList.add('correct');
            playSound('correct');
            document.getElementById('score').innerText = score;
            saveScore();
            setTimeout(loadCase, 1500);
        } else {
            btn.classList.add('wrong');
            playSound('wrong');
            score = Math.max(0, score - 50);
            document.getElementById('score').innerText = score;
        }
    }

    function saveScore() {
        let scores = JSON.parse(localStorage.getItem('urinalysisScores') || '[]');
        const userIndex = scores.findIndex(s => s.name === playerName);
        if (userIndex > -1) {
            if (score > scores[userIndex].score) scores[userIndex].score = score;
        } else {
            scores.push({name: playerName, score: score});
        }
        localStorage.setItem('urinalysisScores', JSON.stringify(scores));
        updateLeaderboard();
    }

    function updateLeaderboard() {
        let scores = JSON.parse(localStorage.getItem('urinalysisScores') || '[]');
        scores.sort((a, b) => b.score - a.score);
        const list = document.getElementById('score-list');
        list.innerHTML = scores.slice(0, 5).map(s => `<li>${s.name}: ${s.score}</li>`).join('');
    }
</script>
</body>
</html>
