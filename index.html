<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urinalysis Blitz: Final Edition</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Fredoka', sans-serif; transition: all 0.2s ease; }
    body { background: #0f172a; color: #e2e8f0; margin: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
    
    .sample-tube {
      background: linear-gradient(180deg, rgba(255,255,255,0.1) 20%, var(--sample-color) 20%);
      border-radius: 0 0 25px 25px;
      position: relative; overflow: hidden; border: 4px solid rgba(255,255,255,0.4);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .sample-tube::after {
      content: ""; position: absolute; top: 15%; left: -50%; width: 200%; height: 10%;
      background: rgba(255,255,255,0.2); border-radius: 40%; animation: wave 3s infinite linear;
    }
    @keyframes wave { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    .shake-animation { animation: shake 0.3s ease-in-out; }
    
    .combo-bounce { animation: bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); color: #fbbf24; }
    @keyframes bounce { 0% { transform: scale(0.5); } 100% { transform: scale(1.1); } }
    
    .progress-fill { transition: width 0.5s ease-in-out; }
  </style>
</head>
<body>

  <div id="app" class="w-full max-w-xl p-4">
    <div id="home-screen" class="text-center">
      <div class="text-7xl mb-6">🧪</div>
      <h1 class="text-5xl font-bold text-amber-400 mb-4">Urinalysis Blitz</h1>
      <p class="text-slate-400 mb-8 text-lg">Analyze 10 specimens. You have 10s per case.<br>Fast answers earn <span class="text-amber-400 font-bold">2x Blitz Combos!</span></p>
      <button onclick="startGame()" class="px-12 py-5 bg-amber-500 hover:bg-amber-400 text-indigo-950 font-bold text-2xl rounded-2xl shadow-2xl transform hover:scale-105 transition-all">
        START SHIFT
      </button>
    </div>

    <div id="game-screen" class="hidden">
      <div class="w-full bg-slate-800 h-2 rounded-full mb-6 overflow-hidden border border-slate-700">
        <div id="progress-bar" class="progress-fill h-full bg-amber-500 w-0"></div>
      </div>

      <div class="flex justify-between items-end mb-6">
        <div>
          <p class="text-xs uppercase text-slate-500 tracking-widest font-bold">Case Progress</p>
          <p class="text-2xl font-bold text-white"><span id="question-num">1</span><span class="text-slate-500">/10</span></p>
        </div>
        <div class="text-center">
          <p id="timer" class="text-5xl font-black text-amber-400 tabular-nums">10</p>
        </div>
        <div class="text-right">
          <p class="text-xs uppercase text-slate-500 tracking-widest font-bold">Score</p>
          <p id="score" class="text-2xl font-bold text-emerald-400 tabular-nums">0</p>
        </div>
      </div>

      <div id="game-card" class="bg-slate-800/80 backdrop-blur-md p-8 rounded-3xl border border-slate-700 shadow-2xl relative">
        <div class="flex justify-center mb-8">
          <div id="sample-tube" class="w-20 h-36" style="--sample-color: #fef08a;"></div>
        </div>
        <h2 id="question" class="text-xl text-white text-center mb-8 font-medium min-h-[60px] leading-tight">Analyzing specimen...</h2>
        <div id="options" class="grid grid-cols-1 gap-3"></div>
        <div id="feedback" class="mt-6 text-center text-xl font-bold h-10"></div>
      </div>
    </div>

    <div id="gameover-screen" class="hidden text-center">
      <h2 class="text-5xl font-bold text-amber-400 mb-4">Shift Complete!</h2>
      <div class="bg-slate-800 p-8 rounded-3xl mb-8 border border-slate-700 shadow-xl">
        <p class="text-slate-400 uppercase tracking-widest mb-2 font-bold">Final Performance Rating</p>
        <p class="text-7xl font-black text-white" id="final-score">0</p>
      </div>
      <button onclick="location.reload()" class="px-10 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xl rounded-2xl shadow-xl transition-all hover:scale-105">
        NEW ROTATION
      </button>
    </div>
  </div>

  <script>
    // --- EXCITING AUDIO ENGINE ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const sounds = {
      start: () => {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.5);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.5);
      },
      tick: (t) => {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.setValueAtTime(150 + (10 - t) * 40, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.15);
      },
      success: (combo) => {
        const notes = combo ? [880, 1108, 1318, 1760] : [440, 554, 659];
        notes.forEach((f, i) => {
          const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
          o.type = 'triangle'; o.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.05));
          g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
          o.connect(g); g.connect(audioCtx.destination); o.start(audioCtx.currentTime + (i * 0.05)); o.stop(audioCtx.currentTime + 0.5);
        });
      },
      error: () => {
        [100, 115].forEach(f => {
          const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
          o.type = 'sawtooth'; o.frequency.setValueAtTime(f, audioCtx.currentTime);
          g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
          o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.4);
        });
      }
    };

    // --- DATA ---
    const questionBank = [
      { color: '#fef9c3', question: 'Pale yellow/straw color indicates?', options: ['Normal hydration', 'Dehydration', 'Blood in urine', 'Liver disease'], correct: 0 },
      { color: '#fbbf24', question: 'This dark yellow/amber color suggests:', options: ['Normal hydration', 'Concentrated urine/Dehydration', 'Infection', 'Kidney failure'], correct: 1 },
      { color: '#f87171', question: 'A reddish/pink urine sample may indicate:', options: ['Normal finding', 'Hematuria (blood in urine)', 'Good hydration', 'High protein'], correct: 1 },
      { color: '#a3e635', question: 'Bright/fluorescent yellow urine is often caused by:', options: ['Kidney disease', 'B vitamins or Riboflavin', 'Diabetes', 'Infection'], correct:
