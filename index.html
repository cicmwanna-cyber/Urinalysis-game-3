<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urinalysis Blitz</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Fredoka', sans-serif; transition: all 0.2s ease; }
    body { background: #0f172a; color: #e2e8f0; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    
    .sample-tube {
      background: linear-gradient(180deg, rgba(255,255,255,0.1) 20%, var(--sample-color) 20%);
      border-radius: 0 0 25px 25px;
      position: relative; overflow: hidden; border: 4px solid rgba(255,255,255,0.4);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .sample-tube::after {
      content: ""; position: absolute; top: 15%; left: -50%; width: 200%; height: 10%;
      background: rgba(255,255,255,0.2); border-radius: 40%; animation: wave 3s infinite linear;
    }
    @keyframes wave { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    .shake-animation { animation: shake 0.3s ease-in-out; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    
    .progress-fill { transition: width 0.5s ease-in-out; }
    .combo-bounce { animation: bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes bounce { 0% { transform: scale(0.5); } 100% { transform: scale(1.1); } }
  </style>
 </head>
 <body>
  <div id="app" class="w-full max-w-xl p-4 h-full">
   
   <div id="home-screen" class="text-center h-full flex flex-col items-center justify-center">
    <div class="text-7xl mb-6">🧪</div>
    <h1 id="game-title" class="text-5xl font-bold text-amber-400 mb-4">Urinalysis Blitz</h1>
    
    <div class="mb-6 bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700 inline-flex items-center gap-3">
        <span class="text-slate-400 text-sm font-medium uppercase tracking-wider">Global Avg:</span>
        <span id="avg-score-display" class="text-amber-400 font-bold text-lg">0</span>
    </div>

    <p class="text-slate-400 mb-8 text-lg px-4">Identify the urine specimens correctly. <br> Fast answers earn <span class="text-amber-400 font-bold">Blitz Combos!</span></p>
    
    <input type="text" id="player-name" maxlength="15" placeholder="Enter your name..." class="w-full max-w-xs px-4 py-4 rounded-2xl bg-slate-700 border-2 border-slate-600 text-white placeholder-slate-400 focus:border-amber-400 focus:outline-none mb-4 text-center text-xl font-medium"> 
    
    <button onclick="startGame()" class="px-12 py-5 bg-amber-500 hover:bg-amber-400 text-indigo-950 font-bold text-2xl rounded-2xl shadow-2xl transform hover:scale-105 transition-all w-full max-w-xs uppercase"> Start Shift </button> 
    <button onclick="showScoreboard()" class="mt-4 px-8 py-3 bg-slate-700 hover:bg-slate-600 text-amber-400 font-bold rounded-xl transition-all w-full max-w-xs uppercase"> 🏆 Leaderboard </button>
   </div>

   <div id="game-screen" class="hidden h-full flex flex-col pt-4">
    <div class="w-full bg-slate-800 h-2 rounded-full mb-6 overflow-hidden border border-slate-700">
     <div id="progress-bar" class="progress-fill h-full bg-amber-500 w-0"></div>
    </div>
    <div class="flex justify-between items-end mb-6">
     <div class="text-left">
        <p class="text-xs uppercase text-slate-500 font-bold tracking-widest">Case</p>
        <p id="question-num" class="text-2xl font-bold text-white">1/10</p>
     </div>
     <div class="text-center">
        <p id="timer" class="text-5xl font-black text-amber-400 tabular-nums">10</p>
     </div>
     <div class="text-right">
        <p class="text-xs uppercase text-slate-500 font-bold tracking-widest">Score</p>
        <p id="score" class="text-2xl font-bold text-emerald-400 tabular-nums">0</p>
     </div>
    </div>
    <div id="game-card" class="bg-slate-800/80 backdrop-blur-md p-8 rounded-3xl border border-slate-700 shadow-2xl flex-1 flex flex-col justify-center">
     <div class="flex justify-center mb-8">
        <div id="sample-tube" class="w-20 h-36 sample-tube" style="--sample-color: #fef08a;"></div>
     </div>
     <h2 id="question" class="text-xl text-white text-center mb-8 font-medium min-h-[60px] leading-tight">Analyzing specimen...</h2>
     <div id="options" class="grid grid-cols-1 gap-3"></div>
     <div id="feedback" class="mt-6 text-center text-xl font-bold h-10"></div>
    </div>
   </div>

   <div id="gameover-screen" class="hidden h-full flex flex-col items-center justify-center text-center">
    <h2 class="text-5xl font-bold text-amber-400 mb-4">Shift Complete!</h2>
    <div class="bg-slate-800 p-8 rounded-3xl mb-8 border border-slate-700 shadow-xl w-full">
     <p class="text-slate-400 uppercase tracking-widest mb-2 font-bold">Final Score</p>
     <p class="text-7xl font-black text-white" id="final-score">0</p>
    </div>
    <div class="flex flex-col gap-3 w-full max-w-xs">
        <button id="share-btn" onclick="shareScore()" class="px-10 py-4 bg-emerald-600 text-white font-bold text-xl rounded-2xl shadow-xl transition-all hover:scale-105 flex items-center justify-center gap-2"> 📤 SHARE SCORE </button>
        <button onclick="showScoreboard()" class="px-10 py-4 bg-amber-500 text-indigo-950 font-bold text-xl rounded-2xl shadow-xl transition-all hover:scale-105"> 🏆 VIEW RANKING </button>
        <button onclick="startGame()" class="px-10 py-4 bg-indigo-600 text-white font-bold text-xl rounded-2xl shadow-xl transition-all hover:scale-105"> NEW ROTATION </button> 
        <button onclick="goHome()" class="px-10 py-4 bg-slate-700 text-amber-400 font-bold rounded-2xl transition-all"> HOME </button>
    </div>
   </div>

   <div id="scoreboard-screen" class="hidden h-full flex flex-col py-6">
    <div class="flex justify-between items-center mb-6">
     <h2 class="text-3xl font-bold text-amber-400">🏆 Leaderboard</h2>
     <button onclick="goHome()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-all"> Back </button>
    </div>
    <div id="scoreboard-list" class="flex-1 overflow-auto bg-slate-800/50 rounded-2xl p-4 border border-slate-700 space-y-2">
     <p class="text-slate-400 text-center py-8">Fetching records...</p>
    </div>
   </div>

  </div>

  <script>
    const questionBank = [
      { color: '#fef9c3', question: 'Pale yellow/straw color indicates?', options: ['Normal hydration', 'Dehydration', 'Blood in urine', 'Liver disease'], correct: 0 },
      { color: '#fbbf24', question: 'This dark yellow/amber color suggests:', options: ['Normal hydration', 'Concentrated urine/Dehydration', 'Infection', 'Kidney failure'], correct: 1 },
      { color: '#f87171', question: 'A reddish/pink urine sample may indicate:', options: ['Normal finding', 'Hematuria (blood in urine)', 'Good hydration', 'High protein'], correct: 1 },
      { color: '#a3e635', question: 'Bright/fluorescent yellow urine is often caused by:', options: ['Kidney disease', 'B vitamins or Riboflavin', 'Diabetes', 'Infection'], correct: 1 },
      { color: '#78350f', question: 'Dark brown/tea-colored urine could indicate:', options: ['Normal hydration', 'Liver or kidney disorder', 'Excessive water', 'High calcium'], correct: 1 },
      { color: '#22c55e', question: 'Green-tinged urine might be caused by:', options: ['Certain medications/dyes', 'Normal variation', 'Dehydration', 'High protein'], correct: 0 },
      { color: '#f97316', question: 'Orange-colored urine can result from:', options: ['Good hydration', 'Medications or Dehydration', 'High sugar', 'Low sodium'], correct: 1 },
      { color: '#ffffff', question: 'Cloudy/Turbid urine typically suggests:', options: ['Normal finding', 'UTI or Inflammation', 'Excellent hydration', 'High sugar'], correct: 1 },
      { color: '#fef3c7', question: 'Presence of glucose in urine may suggest:', options: ['Normal finding', 'Diabetes mellitus', 'Dehydration', 'UTI'], correct: 1 },
      { color: '#e9d5ff', question: 'Persistent foamy urine often indicates:', options: ['Proteinuria (Kidney issues)', 'Good hydration', 'Vitamin deficiency', 'Low BP'], correct: 0 }
    ];

    let currentScore = 0, timeLeft = 10, currentQuestion = 0, timerInterval = null, questions = [], scores = [], isSaving = false;

    async function initApp() {
      if (window.dataSdk) {
        await window.dataSdk.init({
          onDataChanged: (data) => {
            scores = data;
            const sum = scores.reduce((acc, curr) => acc + (curr.score || 0), 0);
            document.getElementById('avg-score-display').textContent = scores.length ? Math.round(sum / scores.length) : 0;
            renderScoreboard();
          }
        });
      }
    }

    function showScreen(id) {
      ['home-screen', 'game-screen', 'gameover-screen', 'scoreboard-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    function goHome() { showScreen('home-screen'); }
    function showScoreboard() { showScreen('scoreboard-screen'); renderScoreboard(); }

    function startGame() {
      currentScore = 0; currentQuestion = 0; isSaving = false;
      questions = [...questionBank].sort(() => Math.random() - 0.5).slice(0, 10);
      document.getElementById('score').textContent = '0';
      showScreen('game-screen');
      loadQuestion();
    }

    function loadQuestion() {
      if (currentQuestion >= 10) return endGame();
      timeLeft = 10;
      document.getElementById('timer').textContent = '10';
      document.getElementById('progress-bar').style.width = (currentQuestion * 10) + '%';
      document.getElementById('question-num').textContent = `${currentQuestion + 1}/10`;
      
      const q = questions[currentQuestion];
      document.getElementById('sample-tube').style.setProperty('--sample-color', q.color);
      document.getElementById('question').textContent = q.question;
      document.getElementById('feedback').textContent = '';
      
      document.getElementById('options').innerHTML = q.options.map((opt, idx) => `
        <button onclick="checkAnswer(${idx})" class="option-btn p-4 bg-slate-700 text-white rounded-xl border-2 border-slate-600 text-left transition-all hover:border-amber-400 font-medium">
          ${String.fromCharCode(65 + idx)}. ${opt}
        </button>`).join('');
      
      startTimer();
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').textContent = timeLeft;
        if (timeLeft <= 3) document.getElementById('timer').classList.add('text-red-500', 'animate-pulse');
        else document.getElementById('timer').classList.remove('text-red-500', 'animate-pulse');
        
        if (timeLeft <= 0) { clearInterval(timerInterval); nextQuestion(); }
      }, 1000);
    }

    function checkAnswer(idx) {
      clearInterval(timerInterval);
      const isCorrect = idx === questions[currentQuestion].correct;
      const points = isCorrect ? (timeLeft >= 7 ? 20 : 10) : 0;
      currentScore += points;
      
      document.getElementById('score').textContent = currentScore;
      document.getElementById('feedback').innerHTML = isCorrect 
        ? `<span class="text-emerald-400 combo-bounce block">${timeLeft >= 7 ? '⚡ BLITZ COMBO +20' : 'CORRECT! +10'}</span>` 
        : `<span class="text-red-500">DIAGNOSTIC ERROR!</span>`;
      
      if (!isCorrect) {
          document.getElementById('game-card').classList.add('shake-animation');
          setTimeout(() => document.getElementById('game-card').classList.remove('shake-animation'), 300);
      }

      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      setTimeout(nextQuestion, 1500);
    }

    function nextQuestion() { currentQuestion++; loadQuestion(); }

    async function endGame() {
      if (isSaving) return; isSaving = true;
      document.getElementById('final-score').textContent = currentScore;
      showScreen('gameover-screen');

      const name = document.getElementById('player-name').value.trim() || 'Intern';
      if (window.dataSdk) {
        await window.dataSdk.create({ 
            player_name: name, 
            score: currentScore, 
            played_at: new Date().toISOString() 
        });
      }
    }

    async function shareScore() {
        const name = document.getElementById('player-name').value.trim() || 'Intern';
        const text = `🧪 I just completed my lab shift in Urinalysis Blitz!\n\nName: ${name}\nScore: ${currentScore} points\n\nCan you beat my diagnostic accuracy?`;
        
        if (navigator.share) {
            try {
                await navigator.share({ title: 'Urinalysis Blitz', text: text, url: window.location.href });
            } catch (err) { console.log('Share failed', err); }
        } else {
            await navigator.clipboard.writeText(text);
            alert('Score copied to clipboard!');
        }
    }

    function renderScoreboard() {
      const listEl = document.getElementById('scoreboard-list');
      if (!scores || scores.length === 0) {
        listEl.innerHTML = '<p class="text-slate-400 text-center py-8">No records in database yet.</p>';
        return;
      }
      const sorted = [...scores].sort((a, b) => b.score - a.score).slice(0, 10);
      listEl.innerHTML = sorted.map((s, i) => `
        <div class="flex items-center justify-between p-4 rounded-2xl ${i < 3 ? 'bg-amber-500/20 border border-amber-500/30' : 'bg-slate-800/50'}">
          <div class="flex items-center gap-4">
            <span class="text-2xl w-8 text-center">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</span>
            <span class="text-white font-bold">${s.player_name}</span>
          </div>
          <span class="text-amber-400 font-black text-xl">${s.score}</span>
        </div>
      `).join('');
    }

    initApp();
  </script>
 </body>
</html>
