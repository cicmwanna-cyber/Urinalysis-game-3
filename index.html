<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urinalysis Blitz: 10-Case Challenge</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Fredoka', sans-serif; transition: all 0.2s ease; }
    body { background: #0f172a; color: #e2e8f0; margin: 0; overflow: hidden; }
    .sample-tube {
      background: linear-gradient(180deg, rgba(255,255,255,0.1) 20%, var(--sample-color) 20%);
      border-radius: 0 0 25px 25px;
      position: relative; overflow: hidden; border: 4px solid rgba(255,255,255,0.4);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .sample-tube::after {
      content: ""; position: absolute; top: 15%; left: -50%; width: 200%; height: 10%;
      background: rgba(255,255,255,0.2); border-radius: 40%; animation: wave 3s infinite linear;
    }
    @keyframes wave { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    .shake-animation { animation: shake 0.3s ease-in-out; }
    .combo-bounce { animation: bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); color: #fbbf24; }
    @keyframes bounce { 0% { transform: scale(0.5); } 100% { transform: scale(1.1); } }
  </style>
</head>
<body class="h-full flex items-center justify-center">

  <div id="app" class="w-full max-w-xl p-4">
    <div id="home-screen" class="text-center">
      <h1 class="text-5xl font-bold text-amber-400 mb-4">Urinalysis Blitz</h1>
      <p class="text-indigo-200 mb-8 text-lg">10 Questions. 10 Seconds Each. Go!</p>
      <button onclick="startGame()" class="px-12 py-5 bg-amber-500 hover:bg-amber-400 text-indigo-950 font-bold text-2xl rounded-2xl shadow-2xl transform hover:scale-105 transition-all">
        START SHIFT 🧪
      </button>
    </div>

    <div id="game-screen" class="hidden">
      <div class="flex justify-between items-center mb-6 bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
        <div>
          <p class="text-xs uppercase text-slate-400 tracking-widest">Question</p>
          <p class="text-2xl font-bold text-white"><span id="question-num">1</span><span class="text-slate-500">/10</span></p>
        </div>
        <div class="text-center">
          <p class="text-xs uppercase text-slate-400 tracking-widest">Time</p>
          <p id="timer" class="text-3xl font-black text-amber-400">10</p>
        </div>
        <div class="text-right">
          <p class="text-xs uppercase text-slate-400 tracking-widest">Score</p>
          <p id="score" class="text-2xl font-bold text-emerald-400">0</p>
        </div>
      </div>

      <div id="game-card" class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl relative">
        <div class="flex justify-center mb-8">
          <div id="sample-tube" class="w-20 h-36" style="--sample-color: #fef08a;"></div>
        </div>
        <h2 id="question" class="text-xl text-white text-center mb-8 font-medium min-h-[60px]">Analyzing specimen...</h2>
        <div id="options" class="grid grid-cols-1 gap-3"></div>
        <div id="feedback" class="mt-6 text-center text-xl font-bold h-8"></div>
      </div>
    </div>

    <div id="gameover-screen" class="hidden text-center">
      <h2 class="text-5xl font-bold text-amber-400 mb-4">Results In!</h2>
      <div class="bg-slate-800 p-8 rounded-3xl mb-8 border border-slate-700">
        <p class="text-slate-400 uppercase tracking-widest mb-2">Final Clinical Score</p>
        <p class="text-7xl font-black text-white" id="final-score">0</p>
      </div>
      <button onclick="location.reload()" class="px-10 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xl rounded-2xl shadow-xl transition-all">
        NEW ROTATION
      </button>
    </div>
  </div>

  <script>
    // --- EXCITING AUDIO ENGINE ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const sounds = {
      start: () => {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.5);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.5);
      },
      tick: (t) => {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.setValueAtTime(150 + (10 - t) * 30, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1);
      },
      success: (combo) => {
        const notes = combo ? [880, 1108, 1318, 1760] : [440, 554, 659];
        notes.forEach((f, i) => {
          const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
          o.type = 'triangle'; o.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.05));
          g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
          o.connect(g); g.connect(audioCtx.destination); o.start(audioCtx.currentTime + (i * 0.05)); o.stop(audioCtx.currentTime + 0.5);
        });
      },
      error: () => {
        [100, 115].forEach(f => {
          const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
          o.type = 'sawtooth'; o.frequency.setValueAtTime(f, audioCtx.currentTime);
          g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
          o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.4);
        });
      }
    };

    // --- GAME LOGIC ---
    let currentScore = 0, timeLeft = 10, currentQuestion = 0, timerInterval = null, questions = [];

    const questionBank = [
      { color: '#fef9c3', question: 'What does this pale yellow color indicate?', options: ['Normal hydration', 'Dehydration', 'Blood', 'Liver Issues'], correct: 0 },
      { color: '#fbbf24', question: 'Dark yellow/Amber color suggests:', options: ['Good hydration', 'Dehydration', 'Infection', 'Vitamin C'], correct: 1 },
      { color: '#f87171', question: 'Pink or Reddish urine usually means:', options: ['Healthy', 'Hematuria (Blood)', 'High Sugar', 'Low Sodium'], correct: 1 },
      { color: '#a3e635', question: 'Bright fluorescent yellow is often caused by:', options: ['Kidney Stones', 'B Vitamins', 'Tap Water', 'Exhaustion'], correct: 1 },
      { color: '#78350f', question: 'Brown/Tea-colored urine points to:', options: ['Normal', 'Liver/Bile issues', 'High Salt', 'Protein'], correct: 1 },
      { color: '#22c55e', question: 'Greenish tint could be from:', options: ['Propofol/Dyes', 'Dehydration', 'High Protein', 'Anemia'], correct: 0 },
      { color: '#f97316', question: 'Orange urine can result from:', options: ['Normal', 'Rifampin/Meds', 'Low Sugar', 'Good flow'], correct: 1 },
      { color: '#ffffff', question: 'Cloudy/Milky appearance suggests:', options: ['Clear', 'Infection/Pyuria', 'Caffeine', 'Fasting'], correct: 1 },
      { color: '#fef3c7', question: 'Sweet-smelling urine + Glucose?', options: ['Healthy', 'Diabetes Mellitus', 'Dehydration', 'Low Salt'], correct: 1 },
      { color: '#e9d5ff', question: 'Persistent foamy urine often indicates:', options: ['Proteinuria', 'Good flow', 'Vitamin C', 'High pH'], correct: 0 }
    ];

    function startGame() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      sounds.start();
      questions = [...questionBank].sort(() => Math.random() - 0.5).slice(0, 10);
      document.getElementById('home-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      loadQuestion();
    }

    function loadQuestion() {
      if (currentQuestion >= 10) return endGame();
      
      timeLeft = 10;
      updateTimerUI();
      startTimer();

      const q = questions[currentQuestion];
      document.getElementById('sample-tube').style.setProperty('--sample-color', q.color);
      document.getElementById('question').textContent = q.question;
      document.getElementById('question-num').textContent = currentQuestion + 1;
      document.getElementById('feedback').textContent = '';
      
      const optionsEl = document.getElementById('options');
      optionsEl.innerHTML = q.options.map((opt, idx) => `
        <button onclick="checkAnswer(${idx})" class="option-btn p-4 bg-slate-700 hover:bg-slate-600 text-white rounded-xl border border-slate-600 text-left transition-all">
          ${opt}
        </button>
      `).join('');
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerUI();
        if (timeLeft > 0) sounds.tick(timeLeft);
        else handleTimeout();
      }, 1000);
    }

    function updateTimerUI() {
      const el = document.getElementById('timer');
      el.textContent = timeLeft;
      el.className = timeLeft <= 3 ? 'text-red-500 font-black animate-pulse scale-110' : 'text-amber-400 font-black';
    }

    function handleTimeout() {
      clearInterval(timerInterval);
      sounds.error();
      document.getElementById('feedback').innerHTML = '<span class="text-red-500">TIME OUT!</span>';
      nextQuestion();
    }

    function checkAnswer(selected) {
      clearInterval(timerInterval);
      const q = questions[currentQuestion];
      const isCorrect = selected === q.correct;
      const isCombo = timeLeft >= 7;
      
      const btns = document.querySelectorAll('.option-btn');
      btns.forEach(b => b.disabled = true);

      if (
