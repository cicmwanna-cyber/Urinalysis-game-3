<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urinalysis Blitz 🩺</title>
    <style>
        :root {
            --urine-yellow: #ffeb3b;
            --amber: #ffc107;
            --med-blue: #2196f3;
            --dark-blue: #1565c0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
            border-top: 8px solid var(--amber);
        }

        .hidden { display: none; }

        h1 { color: var(--dark-blue); margin-bottom: 0.5rem; }
        
        #timer-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }

        #timer-fill {
            height: 100%;
            background: var(--amber);
            width: 100%;
            transition: width 1s linear;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid var(--med-blue);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--med-blue);
            color: white;
        }

        #score-display { font-weight: bold; font-size: 1.2rem; color: #4caf50; }
        
        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1>Urinalysis Blitz 🩺</h1>
        <p>Identify the findings before the lab closes!</p>
        <input type="text" id="player-name" placeholder="Enter Lab Tech Name">
        <button class="btn" onclick="startGame()" style="background: var(--med-blue); color: white;">START SHIFT</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div style="display: flex; justify-content: space-between;">
            <span id="q-count">Question 1/4</span>
            <span id="current-score">Score: 0</span>
        </div>
        <div id="timer-bar"><div id="timer-fill"></div></div>
        <h2 id="question-text">Question goes here?</h2>
        <div id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h1>Lab Report Complete!</h1>
        <p id="final-stats"></p>
        <h3>High Scores:</h3>
        <ul id="high-score-list" style="list-style: none; padding: 0;"></ul>
        <button class="btn" onclick="location.reload()">RESTART</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Which crystal looks like a 'coffin lid'?", a: "Triple Phosphate", options: ["Uric Acid", "Triple Phosphate", "Calcium Oxalate", "Cystine"] },
        { q: "A 'mousy' odor in infant urine suggests...", a: "PKU", options: ["Diabetes", "PKU", "UTI", "MSUD"] },
        { q: "Specific Gravity of 1.000 is usually...", a: "Impossible/Water", options: ["Normal", "Dehydration", "Impossible/Water", "Concentrated"] },
        { q: "Refractive index is used to measure:", a: "Specific Gravity", options: ["pH", "Glucose", "Specific Gravity", "Bilirubin"] }
    ];

    let currentQ = 0;
    let score = 0;
    let timeLeft = 10;
    let timer;
    let playerName = "";

    // Sound effects using Audio Synthesis (No external files needed!)
    function playSound(type) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'correct') {
            osc.frequency.setValueAtTime(500, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        } else {
            osc.frequency.setValueAtTime(200, ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        }
        
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
    }

    function startGame() {
        playerName = document.getElementById('player-name').value || "Guest Tech";
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentQ >= questions.length) return endBatch();
        
        const qData = questions[currentQ];
        document.getElementById('q-count').innerText = `Question ${currentQ + 1}/${questions.length}`;
        document.getElementById('question-text').innerText = qData.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        qData.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt);
            container.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        timeLeft = 10;
        updateTimerBar();
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            updateTimerBar();
            if (timeLeft <= 0) {
                playSound('wrong');
                nextQuestion();
            }
        }, 1000);
    }

    function updateTimerBar() {
        const fill = document.getElementById('timer-fill');
        fill.style.width = (timeLeft * 10) + "%";
        fill.style.backgroundColor = timeLeft < 4 ? "#f44336" : "#ffc107";
    }

    function checkAnswer(choice) {
        clearInterval(timer);
        if (choice === questions[currentQ].a) {
            score += (timeLeft * 10) + 50;
            playSound('correct');
        } else {
            playSound('wrong');
        }
        document.getElementById('current-score').innerText = `Score: ${score}`;
        nextQuestion();
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            endBatch();
        }
    }

    function endBatch() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-stats').innerText = `${playerName}, you scored ${score} points!`;
        
        saveScore(playerName, score);
        displayHighScores();
    }

    function saveScore(name, score) {
        let scores = JSON.parse(localStorage.getItem('urineScores') || '[]');
        scores.push({name, score});
        scores.sort((a, b) => b.score - a.score);
        localStorage.setItem('urineScores', JSON.stringify(scores.slice(0, 5)));
    }

    function displayHighScores() {
        const list = document.getElementById('high-score-list');
        const scores = JSON.parse(localStorage.getItem('urineScores') || '[]');
        list.innerHTML = scores.map(s => `<li>${s.name}: ${s.score}</li>`).join('');
    }
</script>

</body>
</html>
